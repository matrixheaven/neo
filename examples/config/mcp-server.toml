# Example MCP server configuration. `neo mcp list`, `neo print`, and `neo run`
# read these shapes for MCP tool discovery and calls.

[[mcp.servers]]
id = "filesystem"
enabled = true
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]

[mcp.servers.env]
RUST_LOG = "info"

[[mcp.servers]]
id = "remote-docs"
enabled = true
transport = "http"
url = "https://mcp.example.test/rpc"

[mcp.servers.headers]
"x-neo-client" = "neo"
