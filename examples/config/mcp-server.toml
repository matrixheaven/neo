# Example MCP server configuration. `neo mcp list`, `neo print`, and `neo run`
# read this shape for stdio MCP tool discovery and calls.

[[mcp.servers]]
id = "filesystem"
enabled = true
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]

[mcp.servers.env]
RUST_LOG = "info"
