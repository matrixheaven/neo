# Neo Configuration - Providers and Models
#
# A compact multi-provider example based on a realistic coding setup.
# Copy this file to ~/.neo/config.toml (or $NEO_HOME/config.toml), then
# replace the mock credential or export the referenced environment variables.

# Must match a [models.<alias>] key below.
default_model = "kimi-for-coding/k2p7"
default_provider = "kimi-for-coding"
permission_mode = "ask"

# Read a credential from the environment:
#   export KIMI_API_KEY="sk-..."
[providers.kimi-for-coding]
type = "anthropic"
base_url = "https://api.kimi.com/coding/v1"
api_key_env = "KIMI_API_KEY"

# Store a credential inline. This mock key is intentionally unusable.
[providers.custom]
type = "openai"
base_url = "https://botcf.com/v1"
api_key = "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# A second environment-backed Anthropic-compatible endpoint.
[providers.deepseek]
type = "anthropic"
base_url = "https://api.deepseek.com/anthropic"
api_key_env = "DEEPSEEK_API_KEY"

# Toggle-style reasoning.
[models."kimi-for-coding/k2p7"]
provider = "kimi-for-coding"
model = "k2p7"
max_context_tokens = 262144
max_output_tokens = 32768
capabilities = ["streaming", "tools", "reasoning", "images"]
display_name = "Kimi K2.7 Code"

[models."kimi-for-coding/k2p7".reasoning]
type = "toggle"
disable_supported = true

# Effort-style reasoning through an OpenAI-compatible endpoint.
[models."gpt-5.6-sol"]
provider = "custom"
model = "gpt-5.6"
max_context_tokens = 258000
capabilities = ["streaming", "tools", "reasoning", "images"]
display_name = "GPT-5.6"

[models."gpt-5.6-sol".reasoning]
type = "effort"
values = ["low", "medium", "high", "xhigh", "max"]
disable_supported = false

# Combined toggle and effort reasoning.
[models.deepseek_v4_flash]
provider = "deepseek"
model = "deepseek-v4-flash"
max_context_tokens = 1048576
capabilities = ["streaming", "tools", "reasoning"]
display_name = "DeepSeek V4 Flash"

[models.deepseek_v4_flash.reasoning]
type = "combined"
toggle = true
effort = ["high", "max"]
disable_supported = true

[runtime]
temperature = 0.2
max_tokens = 32768
replay_reasoning = true

[runtime.reasoning]
mode = "on"
