name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build neo
        run: cargo build --release --target ${{ matrix.target }} -p neo-agent

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/neo dist/neo-${{ matrix.suffix }}
          tar -czf dist/neo-${{ matrix.suffix }}.tar.gz -C dist neo-${{ matrix.suffix }}

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/neo.exe dist/neo-${{ matrix.suffix }}.exe
          Compress-Archive -Path dist/neo-${{ matrix.suffix }}.exe -DestinationPath dist/neo-${{ matrix.suffix }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: neo-${{ matrix.suffix }}
          path: dist/neo-${{ matrix.suffix }}.*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/neo-${{ matrix.suffix }}.*
