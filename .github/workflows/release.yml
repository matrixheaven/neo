name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate package versions and tag
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(cargo metadata --no-deps --format-version 1)"
          mapfile -t versions < <(
            jq -r '.packages[]
              | select(.name == "neo-ai"
                  or .name == "neo-agent-core"
                  or .name == "neo-tui"
                  or .name == "neo-agent")
              | .version' <<<"$metadata"
          )
          if [ "${#versions[@]}" -ne 4 ]; then
            echo "expected four Neo workspace packages, found ${#versions[@]}" >&2
            exit 1
          fi
          mapfile -t unique_versions < <(printf '%s\n' "${versions[@]}" | sort -u)
          if [ "${#unique_versions[@]}" -ne 1 ]; then
            printf 'Neo package versions differ: %s\n' "${versions[*]}" >&2
            exit 1
          fi
          expected_tag="v${unique_versions[0]}"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "release tag $GITHUB_REF_NAME must equal $expected_tag" >&2
            exit 1
          fi

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            cross: zigbuild
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
          - os: ubuntu-latest
            target: aarch64-pc-windows-msvc
            suffix: windows-arm64
            cross: xwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.cross || 'native' }}

      - uses: goto-bus-stop/setup-zig@v2
        if: matrix.cross == 'zigbuild'
        with:
          version: 0.13.0

      - uses: taiki-e/install-action@v2
        if: matrix.cross == 'zigbuild'
        with:
          tool: cargo-zigbuild

      - uses: taiki-e/install-action@v2
        if: matrix.cross == 'xwin'
        with:
          tool: cargo-xwin

      - uses: KyleMayes/install-llvm-action@v2
        if: matrix.cross == 'xwin'
        with:
          version: "17.0"

      - name: Build neo
        run: |
          if [ "${{ matrix.cross }}" = "zigbuild" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} -p neo-agent
          elif [ "${{ matrix.cross }}" = "xwin" ]; then
            cargo xwin build --release --target ${{ matrix.target }} -p neo-agent
          else
            cargo build --release --target ${{ matrix.target }} -p neo-agent
          fi
        shell: bash

      - name: Package (unix)
        if: ${{ !endsWith(matrix.target, '-windows-msvc') }}
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/neo dist/neo-${{ matrix.suffix }}
          tar -czf dist/neo-${{ matrix.suffix }}.tar.gz -C dist neo-${{ matrix.suffix }}
          rm dist/neo-${{ matrix.suffix }}

      - name: Package (windows)
        if: ${{ endsWith(matrix.target, '-windows-msvc') }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/neo.exe dist/neo-${{ matrix.suffix }}.exe
          Compress-Archive -Path dist/neo-${{ matrix.suffix }}.exe -DestinationPath dist/neo-${{ matrix.suffix }}.zip
          Remove-Item dist/neo-${{ matrix.suffix }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: neo-${{ matrix.suffix }}
          path: dist/neo-${{ matrix.suffix }}*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/neo-${{ matrix.suffix }}*
