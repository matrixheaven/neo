name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: xtask ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install coverage and CRAP tools
        run: |
          cargo install cargo-llvm-cov --locked
          cargo install cargo-crap --locked

      - name: Run local CI gate
        run: cargo run -p xtask -- ci

      - name: Upload coverage and CRAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neo-quality-reports
          path: |
            target/llvm-cov/lcov.info
            target/crap/crap-crates.md
            target/crap/crap-crates.json
            target/crap/crap-workspace.md
          if-no-files-found: ignore
